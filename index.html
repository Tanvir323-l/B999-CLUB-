                    <div class="flex items-center gap-4">

            <div class="flex h-14">

        <div id="overlay" onclick="closePopups()" class="fixed inset-0 bg-black/60 z-[2500] hidden"></div>
        <div id="toast-msg" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; padding: 15px 30px; border-radius: 50px; z-index: 9999; display: none; font-weight: bold; background: #1e293b; border: 1px solid var(--primary);"></div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: atob("QUl6YVN5QkxGb0o0LXY1V0FwYjFGbGc4Y0VyZnFialc2NFhLaC1J"),
            authDomain: atob("YmV0LXdpbi04NGQzNS5maXJlYmFzZWFwcC5jb20="),
            databaseURL: atob("aHR0cHM6Ly9iZXQtd2luLTg0ZDM1LWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=="),
            projectId: atob("YmV0LXdpbi04NGQzNS4="),
            storageBucket: atob("YmV0LXdpbi04NGQzNS5maXJlYmFzZWFwcC5jb20="),
            messagingSenderId: atob("NTAxMzQ1NjU1Ng=="),
            appId: atob("MTo1MDEzNDU2NTU2OndlYjo0YTViMWYyYmRkNzI4YTI2NTYwMTA5")
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userPhone = localStorage.getItem('userPhone') || null;
        let balance = 0, currentMode = '1m', currentPeriod = "", baseAmount = 1, qty = 1, tempBetPick = "", lastResultProcessed = "";
        
        const apiUrls = { 
            '30s': 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json', 
            '1m': 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json', 
            '3m': 'https://draw.ar-lottery01.com/WinGo/WinGo_3M/GetHistoryIssuePage.json', 
            '5m': 'https://draw.ar-lottery01.com/WinGo/WinGo_5M/GetHistoryIssuePage.json' 
        };

        // Auth Logic
        async function handleAuth(type) {
            const phone = document.getElementById(type === 'login' ? 'auth-phone' : 'reg-phone').value;
            const pass = document.getElementById(type === 'login' ? 'auth-pass' : 'reg-pass').value;
            if (!phone || phone.length < 10) return showToast("সঠিক ফোন নাম্বার দিন");
            
            const userRef = db.ref(`users/${phone}`);
            const snap = await userRef.once('value');

            if (type === 'register') {
                const confirm = document.getElementById('reg-confirm').value;
                if (pass !== confirm) return showToast("পাসওয়ার্ড মেলেনি");
                if (snap.exists()) return showToast("নাম্বারটি আগে ব্যবহৃত হয়েছে");
                await userRef.set({ password: pass, balance: 88 });
                showToast("রেজিস্ট্রেশন সফল! ৮৮ টাকা বোনাস।");
                loginUser(phone);
            } else {
                if (snap.exists() && snap.val().password === pass) loginUser(phone);
                else showToast("ভুল ফোন বা পাসওয়ার্ড");
            }
        }

        function loginUser(phone) {
            userPhone = phone;
            localStorage.setItem('userPhone', phone);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'block';
            initGame();
        }

        function logout() { localStorage.removeItem('userPhone'); location.reload(); }
        function toggleAuth() { document.getElementById('login-form').classList.toggle('hidden'); document.getElementById('register-form').classList.toggle('hidden'); }

        // Game Core
        function initGame() {
            db.ref(`users/${userPhone}/balance`).on('value', s => {
                balance = s.val() || 0;
                document.getElementById('user-balance').innerText = balance.toFixed(2);
            });

            db.ref(`users/${userPhone}/bet_history`).limitToLast(15).on('value', s => {
                let html = "";
                s.forEach(c => {
                    const d = c.val();
                    const statusClass = d.status === 'Win' ? 'text-green-500' : (d.status === 'Loss' ? 'text-red-500' : 'text-orange-400');
                    html = `<tr class="border-b border-gray-800"><td class="p-3">${d.period.slice(-4)}</td><td class="p-3 font-bold">${d.pick}</td><td class="p-3">৳${d.amount}</td><td class="p-3 ${statusClass}">${d.status}</td></tr>` + html;
                });
                document.getElementById('my-history-body').innerHTML = html || "<tr><td colspan='4' class='p-5 text-gray-500'>No Data</td></tr>";
            });
            setInterval(fetchGameData, 1000);
        }

        async function fetchGameData() {
            try {
                const res = await fetch(apiUrls[currentMode]);
                const json = await res.json();
                const latest = json.data.list[0];
                currentPeriod = (BigInt(latest.issueNumber) + 1n).toString();
                document.getElementById('current-period').innerText = currentPeriod;

                const duration = currentMode.includes('s') ? 30 : parseInt(currentMode) * 60;
                const timeLeft = duration - (Math.floor(Date.now() / 1000) % duration);
                
                document.getElementById('timer-sec').innerText = String(timeLeft % 60).padStart(2, '0');
                document.getElementById('timer-min').innerText = String(Math.floor(timeLeft / 60)).padStart(2, '0');

                if (timeLeft === duration && lastResultProcessed !== latest.issueNumber) {
                    checkWinning(latest);
                    lastResultProcessed = latest.issueNumber;
                }
                renderHistory(json.data.list);
            } catch (e) {}
        }

        async function checkWinning(result) {
            const resNum = parseInt(result.number);
            const resColor = (resNum % 2 === 0) ? "Red" : "Green";
            const resSize = (resNum >= 5) ? "Big" : "Small";

            const snapshot = await db.ref(`users/${userPhone}/bet_history`).once('value');
            snapshot.forEach(async (child) => {
                const bet = child.val();
                if (bet.period === result.issueNumber && bet.status === 'Pending') {
                    let win = false, winMult = 0;

                    if (bet.pick === result.number) { win = true; winMult = 9; }
                    else if (bet.pick === resColor) { win = true; winMult = 2; }
                    else if (bet.pick === resSize) { win = true; winMult = 2; }
                    else if (bet.pick === "Violet" && (resNum === 0 || resNum === 5)) { win = true; winMult = 4.5; }

                    if (win) {
                        const winAmt = bet.amount * winMult;
                        const newBal = balance + winAmt;
                        await db.ref(`users/${userPhone}`).update({ balance: newBal });
                        await db.ref(`users/${userPhone}/bet_history/${child.key}`).update({ status: 'Win', winAmount: winAmt });
                        showWinPopup(winAmt);
                    } else {
                        await db.ref(`users/${userPhone}/bet_history/${child.key}`).update({ status: 'Loss' });
                    }
                }
            });
        }

        // UI Interactions
        function openBet(pick, color) {
            tempBetPick = pick;
            document.getElementById('pop-header').style.backgroundColor = color;
            document.getElementById('pop-confirm-btn').style.backgroundColor = color;
            document.getElementById('popup-selection').innerText = pick;
            const pop = document.getElementById('bet-popup');
            pop.style.transform = "translateY(0)"; pop.style.visibility = "visible";
            document.getElementById('overlay').classList.remove('hidden');
            updatePopupTotal();
        }

        async function confirmBet() {
            const total = parseFloat(document.getElementById('total-bet-display').innerText);
            if (balance < total) return showToast("ব্যালেন্স কম আছে");
            await db.ref(`users/${userPhone}`).update({ balance: balance - total });
            await db.ref(`users/${userPhone}/bet_history`).push({ period: currentPeriod, pick: tempBetPick, amount: total, status: 'Pending' });
            showToast("সফল হয়েছে!"); closePopups();
        }

        function updatePopupTotal() { 
            const val = baseAmount * (parseInt(document.getElementById('qty-input').value) || 1);
            document.getElementById('total-bet-display').innerText = val.toFixed(2); 
        }

        function setBase(v, el) { 
            baseAmount = v; 
            document.querySelectorAll('.btn-val').forEach(b => b.classList.remove('active')); 
            el.classList.add('active'); 
            updatePopupTotal(); 
        }

        function adjQty(n) { 
            const input = document.getElementById('qty-input');
            input.value = Math.max(1, (parseInt(input.value) || 1) + n); 
            updatePopupTotal(); 
        }

        function closePopups() { 
            document.querySelectorAll('#bet-popup, #deposit-popup, #withdraw-popup').forEach(p => { p.style.transform = "translateY(100%)"; p.style.visibility = "hidden"; }); 
            document.getElementById('overlay').classList.add('hidden'); 
        }

        function showToast(m) { 
            const t = document.getElementById('toast-msg'); t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display = 'none', 3000); 
        }

        function renderHistory(list) {
            document.getElementById('records-body').innerHTML = list.slice(0, 10).map(h => `
                <tr class="border-b border-gray-800">
                    <td class="p-3">${h.issueNumber}</td>
                    <td class="p-3 font-bold" style="color:${parseInt(h.number)%2===0?'#ef4444':'#10b981'}">${h.number}</td>

    <script>
        const firebaseConfig = {
            apiKey: atob("QUl6YVN5QkxGb0o0LXY1V0FwYjFGbGc4Y0VyZnFialc2NFhLaC1J"),
            authDomain: atob("YmV0LXdpbi04NGQzNS5maXJlYmFzZWFwcC5jb20="),
            databaseURL: atob("aHR0cHM6Ly9iZXQtd2luLTg0ZDM1LWRlZmF1bHQtcnRkYi5maXJlYmFzZWlvLmNvbQ=="),
            projectId: atob("YmV0LXdpbi04NGQzNS4="),
            storageBucket: atob("YmV0LXdpbi04NGQzNS5maXJlYmFzZWFwcC5jb20="),
            messagingSenderId: atob("NTAxMzQ1NjU1Ng=="),
            appId: atob("MTo1MDEzNDU2NTU2OndlYjo0YTViMWYyYmRkNzI4YTI2NTYwMTA5")
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let userPhone = localStorage.getItem('userPhone') || null;
        let balance = 0, lastBalance = 0, currentMode = '1m', currentPeriod = "", baseAmount = 1, qty = 1, tempBetPick = "", lastResultProcessed = "";
        const apiUrls = { '30s': 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json', '1m': 'https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json', '3m': 'https://draw.ar-lottery01.com/WinGo/WinGo_3M/GetHistoryIssuePage.json', '5m': 'https://draw.ar-lottery01.com/WinGo/WinGo_5M/GetHistoryIssuePage.json' };

        // --- Auth Functions ---
        function toggleAuth() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('register-form').classList.toggle('hidden');
        }

        async function handleAuth(type) {
            if (type === 'register') {
                const phone = document.getElementById('reg-phone').value;
                const pass = document.getElementById('reg-pass').value;
                const confirm = document.getElementById('reg-confirm').value;
                if (!phone || phone.length < 10) return showToast("সঠিক মোবাইল নাম্বার দিন");
                if (pass !== confirm) return showToast("পাসওয়ার্ড মিলেনি!");
                const userRef = db.ref(`users/${phone}`);
                const snap = await userRef.once('value');
                if (snap.exists()) return showToast("নাম্বারটি আগে থেকেই আছে");
                await userRef.set({ password: pass, balance: 88, isFirstDeposit: true });
                showToast("অভিনন্দন! ৮৮ টাকা বোনাস পেয়েছেন।");
                loginUser(phone);
            } else {
                const phone = document.getElementById('auth-phone').value;
                const pass = document.getElementById('auth-pass').value;
                const snap = await db.ref(`users/${phone}`).once('value');
                if (snap.exists() && snap.val().password === pass) loginUser(phone);
                else showToast("ভুল ফোন বা পাসওয়ার্ড");
            }
        }

        function loginUser(phone) {
            userPhone = phone;
            localStorage.setItem('userPhone', phone);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-content').style.display = 'block';
            initGame();
        }

        function logout() { localStorage.removeItem('userPhone'); location.reload(); }

        // --- Game Logic ---
        function initGame() {
            const userRef = db.ref(`users/${userPhone}`);
            userRef.on('value', s => { 
                const data = s.val(); if(!data) return;
                balance = data.balance || 0; 
                document.getElementById('user-balance').innerText = balance.toFixed(2);
                if (data.isFirstDeposit && balance > 88 && lastBalance === 88) {
                    const depositAmt = balance - 88;
                    if (depositAmt >= 250) {
                        userRef.update({ balance: balance + depositAmt, isFirstDeposit: false });
                        showToast(`৳${depositAmt} ডিপোজিট বোনাস পেয়েছেন!`);
                    }
                }
                lastBalance = balance;
            });

            db.ref(`users/${userPhone}/bet_history`).limitToLast(15).on('value', s => {
                let html = ""; s.forEach(c => { const d = c.val(); const color = d.status === 'Win' ? 'text-green-500' : (d.status === 'Loss' ? 'text-red-500' : 'text-orange-400'); html = `<tr class="border-b border-gray-800"><td class="p-3">${d.period.slice(-4)}</td><td class="p-3 font-bold">${d.pick}</td><td class="p-3">৳${d.amount}</td><td class="p-3 ${color}">${d.status}</td></tr>` + html; });
                document.getElementById('my-history-body').innerHTML = html || "<tr><td colspan='4' class='p-5'>No History</td></tr>";
            });

            db.ref(`users/${userPhone}/wallet`).on('value', s => {
                if(s.exists()){
                    const w = s.val(); document.getElementById('saved-wallet-info').innerText = `${w.type}: ${w.number}`;
                    document.getElementById('add-bank-section').classList.add('hidden');
                    document.getElementById('withdraw-form').classList.remove('hidden');
                } else {
                    document.getElementById('add-bank-section').classList.remove('hidden');
                    document.getElementById('withdraw-form').classList.add('hidden');
                }
            });
            setInterval(fetchGameData, 1000);
        }

        async function fetchGameData() { try { const res = await fetch(apiUrls[currentMode]); const json = await res.json(); const latest = json.data.list[0]; currentPeriod = (BigInt(latest.issueNumber) + 1n).toString(); document.getElementById('current-period').innerText = currentPeriod; const duration = currentMode.includes('s') ? 30 : parseInt(currentMode) * 60; const timeLeft = duration - (Math.floor(Date.now() / 1000) % duration); document.getElementById('timer-sec').innerText = String(timeLeft % 60).padStart(2, '0'); document.getElementById('timer-min').innerText = String(Math.floor(timeLeft / 60)).padStart(2, '0'); if (timeLeft <= 5) { document.getElementById('bet-lock-overlay').classList.remove('hidden'); document.getElementById('lock-count-num').innerText = timeLeft; closePopups(); } else { document.getElementById('bet-lock-overlay').classList.add('hidden'); } if (timeLeft === duration && lastResultProcessed !== latest.issueNumber) { checkWinning(latest); lastResultProcessed = latest.issueNumber; } renderHistory(json.data.list); } catch (e) {} }

        async function checkWinning(result) { const resNum = parseInt(result.number); const resColor = (resNum % 2 === 0) ? "Red" : "Green"; const resSize = (resNum >= 5) ? "Big" : "Small"; const snapshot = await db.ref(`users/${userPhone}/bet_history`).once('value'); snapshot.forEach(async (child) => { const bet = child.val(); if (bet.period === result.issueNumber && bet.status === 'Pending') { let win = false, winMult = 0; if (bet.pick === result.number) { win = true; winMult = 9; } else if (bet.pick === resColor) { win = true; winMult = 2; } else if (bet.pick === resSize) { win = true; winMult = 2; } if (win) { const winAmt = bet.amount * winMult; await db.ref(`users/${userPhone}`).update({ balance: balance + winAmt }); await db.ref(`users/${userPhone}/bet_history/${child.key}`).update({ status: 'Win', winAmount: winAmt }); showWinPopup(winAmt); } else { await db.ref(`users/${userPhone}/bet_history/${child.key}`).update({ status: 'Loss' }); } } }); }

        function openBet(pick, color) { tempBetPick = pick; document.getElementById('pop-header').style.backgroundColor = color; document.getElementById('pop-confirm-btn').style.backgroundColor = color; document.getElementById('popup-selection').innerText = pick; const pop = document.getElementById('bet-popup'); pop.style.transform = "translateY(0)"; pop.style.visibility = "visible"; document.getElementById('overlay').classList.remove('hidden'); updatePopupTotal(); }
        async function confirmBet() { const total = parseFloat(document.getElementById('total-bet-display').innerText); if (balance < total) return showToast("ব্যালেন্স কম আছে"); await db.ref(`users/${userPhone}`).update({ balance: balance - total }); await db.ref(`users/${userPhone}/bet_history`).push({ period: currentPeriod, pick: tempBetPick, amount: total, status: 'Pending' }); showToast("সফল হয়েছে!"); closePopups(); }
        
        // --- Deposit/Withdraw Persistence ---
        async function handleDepositNext() { 
            const amt = parseInt(document.getElementById('recharge-amount').value); 
            if (!amt || amt < 250) return showToast("সর্বনিম্ন ২৫০ টাকা"); 
            const depData = { phone: userPhone, amount: amt, status: 'Pending', time: new Date().toLocaleString() };
            const depKey = db.ref('deposits').push().key;
            await db.ref(`deposits/${depKey}`).set(depData);
            await db.ref(`users/${userPhone}/deposit_history/${depKey}`).set(depData);
            window.location.href = `https://tanvir323-l.github.io/payment-system-tanvir-for-free?user=${userPhone}&amount=${amt}`;
        }

        async function submitWithdraw() { 
            const amt = parseInt(document.getElementById('withdraw-amount').value); 
            if(!amt || amt < 500) return showToast("সর্বনিম্ন ৫০০ টাকা"); 
            if(balance < amt) return showToast("ব্যালেন্স কম আছে"); 
            await db.ref(`users/${userPhone}`).update({ balance: balance - amt }); 
            const witData = { phone: userPhone, amount: amt, status: 'Pending', time: new Date().toLocaleString() };
            const witKey = db.ref(`admin/withdraw_requests`).push().key;
            await db.ref(`admin/withdraw_requests/${witKey}`).set(witData);
            await db.ref(`users/${userPhone}/withdraw_history/${witKey}`).set(witData);
            showToast("অনুরোধ পাঠানো হয়েছে!"); closePopups(); 
        }

        // --- FIXED HISTORY FUNCTION ---
        async function showHistory(type) {
            const title = type === 'deposit' ? "Deposit History" : "Withdraw History";
            const path = type === 'deposit' ? `users/${userPhone}/deposit_history` : `users/${userPhone}/withdraw_history`;
            
            document.getElementById('history-title').innerText = title;
            document.getElementById('history-list-body').innerHTML = "<tr><td colspan='3' class='p-10 text-center'>Loading...</td></tr>";
            
            const pop = document.getElementById('history-modal');
            pop.style.transform = "translateY(0)"; pop.style.visibility = "visible";
            document.getElementById('overlay').classList.remove('hidden');

            // Using once('value') to fix loading issue
            const snap = await db.ref(path).once('value');
            if (snap.exists()) {
                let html = "";
                snap.forEach(child => {
                    const d = child.val();
                    const statusColor = d.status === 'Pending' ? 'text-orange-400' : (d.status === 'Rejected' ? 'text-red-500' : 'text-green-500');
                    html = `<tr class="border-b border-white/5"><td class="py-4 text-[10px] text-gray-400">${d.time.split(',')[0]}</td><td class="py-4 text-center font-bold text-white">৳${d.amount}</td><td class="py-4 text-right font-bold ${statusColor}">${d.status}</td></tr>` + html;
                });
                document.getElementById('history-list-body').innerHTML = html;
            } else {
                document.getElementById('history-list-body').innerHTML = "<tr><td colspan='3' class='p-10 text-center text-gray-600'>No Records Found</td></tr>";
            }
        }

        // --- Helpers ---
        function setRecharge(amt) { document.getElementById('recharge-amount').value = amt; }
        function setBase(v, el) { baseAmount = v; document.querySelectorAll('.btn-val').forEach(b => b.classList.remove('active')); el.classList.add('active'); updatePopupTotal(); }
        function adjQty(n) { qty = Math.max(1, (parseInt(document.getElementById('qty-input').value) || 1) + n); document.getElementById('qty-input').value = qty; updatePopupTotal(); }
        function updatePopupTotal() { document.getElementById('total-bet-display').innerText = (baseAmount * (parseInt(document.getElementById('qty-input').value) || 1)).toFixed(2); }
        function openDepositPopup() { document.getElementById('deposit-popup').style.visibility = "visible"; document.getElementById('deposit-popup').style.transform = "translateY(0)"; document.getElementById('overlay').classList.remove('hidden'); }
        function openWithdrawPopup() { document.getElementById('withdraw-popup').style.visibility = "visible"; document.getElementById('withdraw-popup').style.transform = "translateY(0)"; document.getElementById('overlay').classList.remove('hidden'); }
        function closePopups() { document.querySelectorAll('#bet-popup, #deposit-popup, #withdraw-popup, #history-modal').forEach(p => { p.style.transform = "translateY(100%)"; p.style.visibility = "hidden"; }); document.getElementById('overlay').classList.add('hidden'); }
        function switchMode(m) { currentMode = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('mode-btn-active')); document.getElementById('btn-'+m).classList.add('mode-btn-active'); document.getElementById('display-mode-label').innerText = "Win Go " + m; fetchGameData(); }
        function switchTab(t) { document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active', 'text-white')); document.querySelectorAll('div[id^="content-"]').forEach(c => c.classList.add('hidden')); document.getElementById('tab-'+t).classList.add('tab-active', 'text-white'); document.getElementById('content-'+t).classList.remove('hidden'); }
        function renderHistory(list) { document.getElementById('records-body').innerHTML = list.slice(0, 10).map(h => `<tr class="border-b border-gray-800"><td class="p-3">${h.issueNumber}</td><td class="p-3 font-bold" style="color:${parseInt(h.number)%2===0?'#ef4444':'#10b981'}">${h.number}</td><td class="p-3 font-bold">${parseInt(h.number)>=5?'Big':'Small'}</td></tr>`).join(''); }
        function showWinPopup(amt) { document.getElementById('win-amount-text').innerText = amt.toFixed(2); document.getElementById('win-popup-wrapper').style.display = 'flex'; }
        function closeWinPopup() { document.getElementById('win-popup-wrapper').style.display = 'none'; }
        function showToast(m) { const t = document.getElementById('toast-msg'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
        function saveWallet() { const type = document.getElementById('wallet-type').value; const num = document.getElementById('wallet-number').value; if(num.length < 10) return showToast("নাম্বারটি ভুল"); db.ref(`users/${userPhone}/wallet`).set({ type, number: num }); }

        window.onload = () => { if(userPhone) loginUser(userPhone); };
